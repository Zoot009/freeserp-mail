# Development overlay: adds Mailhog for capturing outbound email and exposes
# the Postgres/Redis ports to the host.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
services:
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI — http://localhost:8025

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
